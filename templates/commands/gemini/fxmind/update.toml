### Step 2 — Run CLI from project root

```bash
npx --yes github:fx-mind/fxmind --update -y
```

Or `fxmind --update -y` if installed globally.

### Step 3 — Report

Summarize CLI output. Remind: restart agent session; Gemini → `/commands reload`.

Preserves `.fxmind/memory/*` and `knowledge-graph.json`. Refreshes `.fxmind/skills/` and the fxmind agent skill only.
"""
